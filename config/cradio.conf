# Cradio/Sweep settings - applies to both cradio_left and cradio_right builds.
# NOTE: this must live in config/ (not boards/shields/cradio/) because Zephyr
# only auto-merges shield confs matching the exact shield name (cradio_left.conf);
# the base-name fallback only works in the user config directory.

# disable ZMK Studio lock screen (always unlocked)
CONFIG_ZMK_STUDIO_LOCKING=n

# increase bluetooth signal power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# improve BLE connection stability (disables 2M PHY, which many
# hosts/adapters handle poorly - the most common ZMK BLE fix)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# work around Windows bug with battery notifications causing
# disconnects/reconnect loops (safe on other OSes too)
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# disable deep sleep
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# "Eager Debouncing" - lower input lag
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5