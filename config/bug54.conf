# Bug54 settings - applies to both bug54_left and bug54_right builds.
# NOTE: user Kconfig settings belong here in config/ (base-name conf applies
# to both halves); shield-dir confs only merge when they match the exact
# shield name being built.

CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# disable ZMK Studio lock screen (always unlocked)
CONFIG_ZMK_STUDIO_LOCKING=n

# increase bluetooth signal power
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# improve BLE connection stability (disables 2M PHY, which many
# hosts/adapters handle poorly - the most common ZMK BLE fix)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# work around Windows bug with battery notifications causing
# disconnects/reconnect loops (safe on other OSes too)
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# disable deep sleep (matches sweep config)
CONFIG_ZMK_SLEEP=n
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# "Eager Debouncing" - lower input lag
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5

# Use internal RC oscillator instead of external 32kHz crystal.
# nice!nano clones often have faulty/missing oscillators, causing the
# BLE link to repeatedly drop (bursts of keys then a stall). Slightly
# higher power draw, but fixes the connection.
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
