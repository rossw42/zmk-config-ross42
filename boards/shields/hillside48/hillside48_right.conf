# Disable ZMK Studio on the right (peripheral) side
CONFIG_ZMK_STUDIO=n

# Ensure this is configured as a peripheral
CONFIG_ZMK_SPLIT_ROLE_PERIPHERAL=y

# Increase BLE transmit power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
