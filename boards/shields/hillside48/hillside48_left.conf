# Enable ZMK Studio on the left (central) side
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=y

# Enable both USB and BLE (allows wireless use + USB for Studio)
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Increase BLE transmit power for better range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Increase split BLE central's connection interval for better reliability
CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=20
